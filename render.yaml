services:
  # FastAPI Backend
  - type: web
    name: lungguard-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: CORS_ORIGINS
        value: https://lungguard.vercel.app
